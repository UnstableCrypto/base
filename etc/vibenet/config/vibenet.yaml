# Vibenet UI content + per-branch config.
# This file is mounted into the nginx container and exposed at:
#   https://vibes.base.org/config.json
#
# Edit this file and re-run `just vibe` (or just restart nginx-gateway) to
# update what devs see. No rebuild of the UI is required.
#
# NOTE: The `branch` and `commit` fields are overwritten at container build
# time by etc/vibenet/scripts/render-config.sh. Do not rely on values set
# here for those two fields.

title: "base vibenet"
subtitle: "An ephemeral Base devnet for trying out in-flight features."

# Faucet section content. The URL is resolved client-side based on the
# hostname (prod vs local); only the description is authored here.
faucet:
  description: >-
    Drip testnet ETH or mint USDV (our public-mint ERC-20) to any address.
    Rate limits apply per IP and per destination address.

# Explorer section content. URL is resolved client-side.
explorer:
  description: >-
    vibescan is the in-house block explorer - browse blocks, transactions,
    and per-address activity feeds.

# "Features this Vibe" - things unique to this devnet branch. Each item has
# a title, one-sentence description, and optional link.
features:
  - title: "USDV (Vibe USD)"
    description: "Public-mint ERC-20 (6 decimals) for testing token flows."
  - title: "NFV (Non-Fungible Vibe)"
    description: "Public-mint ERC-721 for NFT-flow demos."

# Override injected at build time. Do not edit.
branch: "unknown"
commit: "unknown"
