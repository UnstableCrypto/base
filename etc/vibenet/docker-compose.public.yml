# Public TLS overlay for the nginx gateway.
#
# Layered on top of docker-compose.vibenet.yml on the production host.
# Requires TLS files at `/etc/vibenet/tls/origin.{crt,key}`.
#
# Usage:
#   docker compose \
#     -f etc/docker/docker-compose.yml \
#     -f etc/vibenet/docker-compose.vibenet.yml \
#     -f etc/vibenet/docker-compose.public.yml \
#     up -d
#
# `just vibe` auto-discovers this overlay when /etc/vibenet/tls/origin.crt
# is present on the host, so normal operators don't need to pass it manually.

services:
  nginx-gateway:
    # Defaults to loopback; public hosts set VIBENET_PUBLIC_BIND_ADDR.
    ports:
      - "${VIBENET_PUBLIC_BIND_ADDR:-127.0.0.1}:443:443"
    # TLS material lives outside the repo on the host.
    volumes:
      - /etc/vibenet/tls:/etc/nginx/tls:ro
      - ../vibenet/nginx/vibenet-public.conf.template:/etc/nginx/templates/vibenet-public.conf.template:ro
