# Load Test Configuration - Unstable Sepolia
#
# Requires FUNDER_KEY environment variable with a funded private key

transaction_submission_rpcs:
  - "https://sepolia.unstable.org/"
# Must point at an RPC that supports eth_getBlockReceipts for confirmation tracking.
query_rpc: "https://base-sepolia-rpc.publicnode.com"
txpool_nodes: []
flashblocks_ws: "wss://sepolia.flashblocks.unstable.org/ws"

sender_count: 200
target_gps: 60000000
in_flight_per_sender: 128
batch_size: 50
batch_timeout: "10ms"
duration: "60s"
seed: 123456

# 0.01 ETH per account (covers gas for 30s at 2.1M GPS; drained after test)
funding_amount: "10000000000000000"

transactions:
  - weight: 100
    type: transfer
